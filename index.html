<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cute Stock Portfolio</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.cards{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
width:120px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
text-align:center;
}

th{
background:#1e293b;
}

tr{
border-bottom:1px solid #334155;
}

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

.chart{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>📈 Cute Stock Portfolio</h1>

<div class="cards">

<div class="card">
💰<br>Vốn
<div id="capital">0</div>
</div>

<div class="card">
💎<br>Tài sản
<div id="asset">0</div>
</div>

<div class="card">
📊<br>Lãi/Lỗ
<div id="profit">0</div>
</div>

</div>

<table>

<thead>
<tr>
<th>Mã</th>
<th>SL</th>
<th>Giá mua</th>
<th>Giá</th>
<th>%</th>
<th>Lãi</th>
</tr>
</thead>

<tbody id="stockTable"></tbody>

</table>

<div class="chart">
<canvas id="navChart"></canvas>
</div>

<script>

const stocks = [
{code:"HPG",qty:61,buy:30},
{code:"CTG",qty:50,buy:36},
{code:"BID",qty:40,buy:45},
{code:"TCB",qty:60,buy:40}
]

async function getPrice(symbol){

try{

const res = await fetch(
"https://api.simplize.vn/api/quote/"+symbol
)

const data = await res.json()

return data.close

}catch{

return null

}

}

async function updatePrices(){

let capital=0
let asset=0

const table=document.getElementById("stockTable")
table.innerHTML=""

for(let s of stocks){

const price=await getPrice(s.code)

if(!price) continue

const cost=s.buy*s.qty
const value=price*s.qty
const profit=value-cost
const percent=((price-s.buy)/s.buy*100)

capital+=cost
asset+=value

const row=`
<tr>
<td>${s.code}</td>
<td>${s.qty}</td>
<td>${s.buy}</td>
<td>${price.toFixed(2)}</td>
<td class="${percent>=0?"green":"red"}">
${percent.toFixed(2)}%
</td>
<td class="${profit>=0?"green":"red"}">
${profit.toFixed(0)}
</td>
</tr>
`

table.innerHTML+=row

}

const totalProfit=asset-capital

document.getElementById("capital").innerText=capital.toFixed(0)
document.getElementById("asset").innerText=asset.toFixed(0)

const profitEl=document.getElementById("profit")
profitEl.innerText=totalProfit.toFixed(0)
profitEl.className=totalProfit>=0?"green":"red"

updateChart(asset)

}

const ctx=document.getElementById("navChart")

const navChart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[
{
label:"NAV",
data:[],
borderColor:"#22c55e"
}
]
}
})

function updateChart(value){

const time=new Date().toLocaleTimeString()

navChart.data.labels.push(time)
navChart.data.datasets[0].data.push(value)

if(navChart.data.labels.length>20){
navChart.data.labels.shift()
navChart.data.datasets[0].data.shift()
}

navChart.update()

}

updatePrices()

setInterval(updatePrices,5000)

</script>

</body>
</html>

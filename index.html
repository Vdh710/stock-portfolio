<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cute Stock Portfolio</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.cards{
display:flex;
gap:10px;
justify-content:center;
margin:20px 0;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
width:120px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
}

th{
background:#1e293b;
}

tr{
border-bottom:1px solid #334155;
}

.green{color:#22c55e}
.red{color:#ef4444}

.chart{
background:#1e293b;
padding:20px;
margin-top:20px;
border-radius:12px;
}

</style>
</head>

<body>

<h1>📈 Cute Stock Portfolio</h1>

<div class="cards">

<div class="card">
💰<br>Vốn
<div id="capital">0</div>
</div>

<div class="card">
💎<br>Tài sản
<div id="asset">0</div>
</div>

<div class="card">
📊<br>Lãi/Lỗ
<div id="profit">0</div>
</div>

</div>

<table>

<thead>
<tr>
<th>Mã</th>
<th>SL</th>
<th>Giá mua</th>
<th>Giá</th>
<th>%</th>
<th>Lãi</th>
</tr>
</thead>

<tbody id="stockTable"></tbody>

</table>

<div class="chart">
<canvas id="navChart"></canvas>
</div>

<script>

const stocks = [
{code:"HPG",qty:61,buy:30},
{code:"CTG",qty:50,buy:36},
{code:"BID",qty:40,buy:45},
{code:"TCB",qty:60,buy:40}
]

async function getPrice(symbol){

try{

const res = await fetch(
"https://price.tpbs.com.vn/api/StockBoardApi/getStockList"
)

const data = await res.json()

const stock = data.find(s=>s.sym===symbol)

return stock ? stock.lastPrice : null

}catch(e){

return null

}

}

async function updatePrices(){

let capital=0
let asset=0

const table=document.getElementById("stockTable")
table.innerHTML=""

for(let s of stocks){

const price=await getPrice(s.code)

if(!price) continue

const cost=s.buy*s.qty
const value=price*s.qty
const profit=value-cost
const percent=(price-s.buy)/s.buy*100

capital+=cost
asset+=value

table.innerHTML+=`

<tr>
<td>${s.code}</td>
<td>${s.qty}</td>
<td>${s.buy}</td>
<td>${price}</td>
<td class="${percent>=0?'green':'red'}">
${percent.toFixed(2)}%
</td>
<td class="${profit>=0?'green':'red'}">
${profit.toFixed(0)}
</td>
</tr>

`

}

const totalProfit=asset-capital

document.getElementById("capital").innerText=capital.toFixed(0)
document.getElementById("asset").innerText=asset.toFixed(0)

const profitEl=document.getElementById("profit")

profitEl.innerText=totalProfit.toFixed(0)
profitEl.className=totalProfit>=0?"green":"red"

updateChart(asset)

}

const ctx=document.getElementById("navChart")

const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"NAV",
data:[],
borderColor:"#22c55e"
}]
}
})

function updateChart(v){

const t=new Date().toLocaleTimeString()

chart.data.labels.push(t)
chart.data.datasets[0].data.push(v)

if(chart.data.labels.length>20){

chart.data.labels.shift()
chart.data.datasets[0].data.shift()

}

chart.update()

}

updatePrices()

setInterval(updatePrices,5000)

</script>

</body>
</html>
